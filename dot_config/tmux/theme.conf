
# set inactive/active window styles
set -g window-style 'fg=#000000,bg=#e4e4e4'
set -g window-active-style 'fg=#000000,bg=#eeeeee'

# pane border (keep in sync with tmuxline source-of-truth)
set -g pane-border-style 'fg=#0087af,bg=#eeeeee'
set -g pane-active-border-style 'fg=#0087af,bg=#eeeeee'
#set -g pane-border-fg colour238
#set -g pane-active-border-bg colour236
#set -g pane-active-border-fg colour51
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#e4e4e4,bg=#0087af"
set -g message-style "fg=#e4e4e4,bg=#0087af"
set -g pane-border-style "fg=#0087af,bg=#eeeeee"
set -g pane-active-border-style "fg=#0087af,bg=#eeeeee"
set -g status-right-style "none"
set -g status-style "none,bg=#005f87,fg=#e4e4e4"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#e4e4e4,bg=#005f87"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#eeeeee,bg=#005f87"
set -g status-left "#[fg=#585858,bg=#e4e4e4] #S #[fg=#e4e4e4,bg=#005f87,nobold,nounderscore,noitalics]"
#set -g status-right "#[fg=#e4e4e4,bg=#005f87,nobold,nounderscore,noitalics]#[fg=#585858,bg=#e4e4e4]#(echo o) %I:%M %p "
set -g status-right "#[fg=#0087af,bg=#005f87,nobold,nounderscore,noitalics]#[fg=#eeeeee,bg=#0087af] #(/opt/cisco/anyconnect/bin/vpn state | grep -Eoi '(dis)?connected' | uniq) #[fg=#e4e4e4,bg=#0087af,nobold,nounderscore,noitalics]#[fg=#585858,bg=#e4e4e4] %I:%M %p "
setw -g window-status-format "#[fg=#005f87,bg=#005f87,nobold,nounderscore,noitalics]#[default] #I #W #[fg=#005f87,bg=#005f87,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#005f87,bg=#0087af,nobold,nounderscore,noitalics]#[fg=#e4e4e4,bg=#0087af] #I #W #[fg=#0087af,bg=#005f87,nobold,nounderscore,noitalics]"

